# =====================================================================
# CI test stack. Mirrors ../core-service/docker-compose.test.yml.
#
#   docker compose -f docker-compose.test.yml run --rm test
#   docker compose -f docker-compose.test.yml down -v
#
# The `test` service installs deps, builds, then runs the unit and
# integration suites in order (set -e → fail fast).
# =====================================================================
services:

  # One Postgres holds both the hot and archive test shards (separate DBs,
  # created by docker/postgres-test-init.sql on first boot).
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./docker/postgres-test-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  test:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: test
      REGIONS: eg

      DB_POOL_MAX: "5"
      DB_MIGRATION_DIRECTORY: src/migrations
      DB_MIGRATION_EXTENSION: ts

      DB_eg_HOST: postgres
      DB_eg_PORT: "5432"
      DB_eg_USERNAME: postgres
      DB_eg_PASSWORD: postgres
      DB_eg_NAME: order_service_eg_test

      ARCHIVE_DB_eg_HOST: postgres
      ARCHIVE_DB_eg_PORT: "5432"
      ARCHIVE_DB_eg_USERNAME: postgres
      ARCHIVE_DB_eg_PASSWORD: postgres
      ARCHIVE_DB_eg_NAME: order_service_archive_eg_test

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      RABBITMQ_URL: amqp://guest:guest@localhost:5672

      ACCESS_SECRET: test-access-secret
      REFRESH_SECRET: test-refresh-secret
      ACCESS_EXPIRES_IN: "3600"
      REFRESH_EXPIRES_IN: "604800"

      CORE_SERVICE_BASE_URL: http://localhost:3000
      CORE_INTERNAL_API_KEY: test

      KASHIER_MERCHANT_ID: test
      KASHIER_API_KEY: test
      KASHIER_SECRET_KEY: test
      KASHIER_RETURN_URL: http://localhost/return
      KASHIER_FAIL_URL: http://localhost/fail
      KASHIER_WEBHOOK_URL: http://localhost/webhook
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -e -c "npm ci && npm run build && npm test && npm run test:integration"
