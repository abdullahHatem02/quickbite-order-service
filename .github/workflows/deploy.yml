name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPO: order-service
  ECS_SERVICE: order-service
  WORKER_SERVICE: order-worker
  MIGRATE_TASKDEF: order-migrate
  MIGRATE_CMD: "npm run migrate:all:prod"
  SUBNETS: "subnet-0fdefa7a7aa6fa530,subnet-0f3627200b9594d59"
  ECS_SG: sg-037cca9b47845b4a7

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: docker compose -f docker-compose.test.yml run --rm test
      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::909077322399:role/github_deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          IMG=$REG/${{ env.ECR_REPO }}:${{ github.sha }}
          docker build -t $IMG -t $REG/${{ env.ECR_REPO }}:latest .
          docker push $REG/${{ env.ECR_REPO }} --all-tags

      - name: Migrate
        run: |
          ARN=$(aws ecs run-task \
            --cluster quickbite-1 \
            --task-definition ${{ env.MIGRATE_TASKDEF }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNETS }}],securityGroups=[${{ env.ECS_SG }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["sh","-c","'"${{ env.MIGRATE_CMD }}"'"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster quickbite-1 --tasks $ARN
          CODE=$(aws ecs describe-tasks --cluster quickbite-1 --tasks $ARN --query 'tasks[0].containers[0].exitCode' --output text)
          test "$CODE" = "0"

      - name: Deploy
        run: |
          aws ecs update-service --cluster quickbite-1 --service ${{ env.ECS_SERVICE }} --force-new-deployment
          aws ecs update-service --cluster quickbite-1 --service ${{ env.WORKER_SERVICE }} --force-new-deployment
