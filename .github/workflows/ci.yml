name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: docker compose -f docker-compose.test.yml run --rm test

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
